<!DOCTYPE html>
<html>
  <div id="filters" class="info filter-panel">
  <h4>Filters</h4>

  <label>Severity</label><br>
    <select id="severityFilter">
      <option value="all">All</option>
      <option value="High">High</option>
      <option value="Medium">Medium</option>
      <option value="Low">Low</option>
    </select>

    <br><br>

    <label>Min Brightness</label><br>
    <input type="range" id="brightnessFilter" min="0" max="500" step="10">
    <span id="brightnessValue"></span>
  </div>
<head>
  <title>Wildfire GIS Map</title>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h2>Wildfire GIS Map (Prototype)</h2>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
